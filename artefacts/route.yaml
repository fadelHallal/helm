{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.deploymentName }}
spec:
  to:
    kind: Service
    name: {{ .Values.deploymentName }}
  host: {{ .Values.route.host }}
  port:
    targetPort: 8080
  tls:
    termination: edge
{{- end }}
