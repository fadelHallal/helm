deploymentName: imagepro
replicaCount: 2

image:
  repository: imagepro-repo
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  name: imagepro-sa

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

service:
  type: ClusterIP
  port: 8080

route:
  enabled: true
  host: ""
